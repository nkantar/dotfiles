# ====================================================================
# term
# ====================================================================

# xterm RGB color
set -g default-terminal "$TERM"
set-option -ag terminal-overrides ",$TERM:Tc"

# ====================================================================
# shell
# ====================================================================

# fish
set-option -g default-shell /opt/homebrew/bin/fish

# ====================================================================
# misc
# ====================================================================

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# change the prefix key to C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# should fix escaping issue
set -sg escape-time 0


# ====================================================================
# windows and panes
# ====================================================================

# start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# cursor key selection
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# pane creation
bind-key H split-window -h -b -c "#{pane_current_path}"
bind-key J split-window -v -c "#{pane_current_path}"
bind-key K split-window -v -b -c "#{pane_current_path}"
bind-key L split-window -h -c "#{pane_current_path}"

# popup
bind-key o display-popup -E -h 90% -w 90% -d "#{pane_current_path}"
bind-key g display-popup -E -h 90% -w 90% -d "#{pane_current_path}" "lazygit"

# window
bind c new-window -c "#{pane_current_path}"


# ====================================================================
# selection
# ====================================================================

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel


# ====================================================================
# plugins
# ====================================================================

# list of plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "odedlaz/tmux-onedark-theme"
set -g @plugin "tmux-plugins/tmux-yank"

# initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "~/.tmux/plugins/tpm/tpm"


# ====================================================================
# mouse
# ====================================================================
setw -g mouse on


# ====================================================================
# sessions
# ====================================================================

# show in status bar
set -g status 2
set -g status-format[1] "#[bg=#282c34]#{S:#{?#{==:#{client_session},#{session_name}},#[fg=#282c34]#[bg=#98c379]#[bold] #{session_name} #[bg=#282c34]#[fg=#aab2bf]#[nobold],#[fg=#aab2bf] #{session_name} }#{?loop_last_flag,,#[fg=#3e4452]|}}"
set -g status-style "bg=#11111b"

# attach to last used session on session close
set -g detach-on-destroy off
